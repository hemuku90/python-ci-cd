name: build-and-publish

on:
  push:
    branches:
      - development
      - "release/*"
      - "hotfix/*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  IMAGE_REPO: hemant1/gist-api

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.image_ref.outputs.image_digest }}
      image_tag: ${{ steps.image_ref.outputs.image_tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: pyproject.toml
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Test
        run: pytest

      - name: Read version
        id: version
        run: |
          python - <<'PY' > /tmp/version.txt
          import pathlib, re
          text = pathlib.Path("pyproject.toml").read_text()
          match = re.search(r'(?m)^version = "([^"]+)"', text)
          if not match:
            raise SystemExit("Version not found in pyproject.toml")
          print(f"version={match.group(1)}")
          PY
          cat /tmp/version.txt >> "$GITHUB_OUTPUT"

      - name: Validate release branch version
        if: startsWith(github.ref, 'refs/heads/release/')
        run: |
          BRANCH_VERSION="${GITHUB_REF#refs/heads/release/}"
          if [ "${BRANCH_VERSION}" != "${{ steps.version.outputs.version }}" ]; then
            echo "Release branch version (${BRANCH_VERSION}) must match pyproject.toml version (${{ steps.version.outputs.version }})."
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_REPO }}:sha-${{ github.sha }}
            ${{ env.IMAGE_REPO }}:v${{ steps.version.outputs.version }}
            ${{ env.IMAGE_REPO }}:build-${{ github.run_number }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Set image ref
        id: image_ref
        run: |
          echo "IMAGE_DIGEST=${{ steps.build.outputs.digest }}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=sha-${{ github.sha }}" >> "$GITHUB_ENV"
          echo "image_digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"
          echo "image_tag=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        continue-on-error: true
        with:
          image-ref: ${{ env.IMAGE_REPO }}@${{ env.IMAGE_DIGEST }}
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          format: "table"
          exit-code: "1"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_REPO }}@${{ env.IMAGE_DIGEST }}
          format: spdx-json
          artifact-name: sbom.spdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: cosign sign --yes ${{ env.IMAGE_REPO }}@${{ env.IMAGE_DIGEST }}
  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/development'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Set image env
        if: github.ref == 'refs/heads/development'
        run: |
          echo "IMAGE_DIGEST=${{ needs.build.outputs.image_digest }}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${{ needs.build.outputs.image_tag }}" >> "$GITHUB_ENV"

      - name: Sync development branch
        if: github.ref == 'refs/heads/development'
        run: git pull --rebase origin development

      - name: Update dev values
        if: github.ref == 'refs/heads/development'
        uses: mikefarah/yq@v4
        with:
          cmd: yq -i '.image.tag = strenv(IMAGE_TAG) | .image.digest = strenv(IMAGE_DIGEST)' deploy/helm/gist-api/values-dev.yaml

      - name: Commit dev promotion
        if: github.ref == 'refs/heads/development'
        id: promote_dev
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/gist-api/values-dev.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(dev): promote image $IMAGE_TAG"
          git push origin HEAD:development

      - name: Open PR if direct push is blocked
        if: github.ref == 'refs/heads/development' && steps.promote_dev.outcome == 'failure'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: "bot/dev-promotion-${{ github.run_id }}"
          title: "chore(dev): promote image ${{ env.IMAGE_TAG }}"
          commit-message: "chore(dev): promote image ${{ env.IMAGE_TAG }}"
          body: "Automated promotion of the dev image tag and digest."
          base: development
