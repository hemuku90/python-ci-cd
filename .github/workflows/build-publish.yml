name: build-and-publish

on:
  push:
    branches:
      - development
      - "release/*"
      - "hotfix/*"

permissions:
  contents: write
  id-token: write

env:
  IMAGE_REPO: hemant1/gist-api

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: pyproject.toml
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Test
        run: pytest

      - name: Read version
        id: version
        run: |
          python - <<'PY' > /tmp/version.txt
          import pathlib, re
          text = pathlib.Path("pyproject.toml").read_text()
          match = re.search(r'(?m)^version = "([^"]+)"', text)
          if not match:
            raise SystemExit("Version not found in pyproject.toml")
          print(f"version={match.group(1)}")
          PY
          cat /tmp/version.txt >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:sha-${{ github.sha }}
            ${{ env.IMAGE_REPO }}:v${{ steps.version.outputs.version }}
            ${{ env.IMAGE_REPO }}:build-${{ github.run_number }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Set image ref
        run: |
          echo "IMAGE_DIGEST=${{ steps.build.outputs.digest }}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=sha-${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Scan image with Trivy
        uses: aquasec/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_REPO }}@${{ env.IMAGE_DIGEST }}
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          format: "table"
          exit-code: "1"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_REPO }}@${{ env.IMAGE_DIGEST }}
          format: spdx-json
          artifact-name: sbom.spdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: cosign sign --yes ${{ env.IMAGE_REPO }}@${{ env.IMAGE_DIGEST }}

      - name: Update dev values
        if: github.ref == 'refs/heads/development'
        uses: mikefarah/yq@v4
        with:
          cmd: yq -i '.image.tag = strenv(IMAGE_TAG) | .image.digest = strenv(IMAGE_DIGEST)' deploy/helm/gist-api/values-dev.yaml

      - name: Commit dev promotion
        if: github.ref == 'refs/heads/development'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/gist-api/values-dev.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(dev): promote image $IMAGE_TAG"
          git push origin HEAD:development
