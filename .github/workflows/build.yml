# =============================================================================
# Build Workflow: Docker Image Creation (Build Once)
# =============================================================================
# Builds the canonical Docker image when code is merged into develop.
# This image is then promoted/deployed across all environments.
# =============================================================================

name: Build Image

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: 'gist-api'
  DOCKER_REGISTRY: 'hemant1'
  ARTIFACT_RETENTION_DAYS: 30

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.prep.outputs.image_tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Image Tag
        id: prep
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          TAG="${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}"
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.prep.outputs.image_tag }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:develop-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Run Security Scan on the newly built image
      - name: Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.prep.outputs.image_tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Save Image Tag Artifact
        run: echo "${{ steps.prep.outputs.image_tag }}" > image-tag.txt

      - name: Upload Image Info
        uses: actions/upload-artifact@v4
        with:
          name: image-info
          path: image-tag.txt
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
