name: Build Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  IMAGE_NAME: 'gist-api'
  DOCKER_REGISTRY: 'hemant1'

permissions:
  id-token: write
  contents: write
  security-events: write

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.prep.outputs.tag_name }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Metadata
        id: prep
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            TAG_NAME=$VERSION
          else
            TAG_NAME="manual-$(date +%s)"
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check Image Existence
        id: check
        run: |
          IMAGE_TAG="${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.prep.outputs.tag_name }}"
          if docker manifest inspect $IMAGE_TAG > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Image $IMAGE_TAG already exists. Skipping build."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Image $IMAGE_TAG not found. Building..."
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.prep.outputs.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Vulnerability Scan (Trivy)
        if: steps.check.outputs.exists == 'false'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.prep.outputs.tag_name }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

  prep-dev:
    name: Prep Dev
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Update Dev Manifest
        run: |
          TAG="${{ needs.build-and-push.outputs.tag_name }}"
          MANIFEST=".github/deployments/dev-tags.yml"
          sed -i "s/tag:.*/tag: $TAG/" $MANIFEST
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add $MANIFEST
          git commit -m "chore(ops): update dev to $TAG [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push origin main

  deploy-dev:
    name: Deploy to Dev
    needs: [build-and-push, prep-dev]
    uses: ./.github/workflows/deploy-template.yml
    with:
      environment: dev
      image_tag: "hemant1/gist-api:${{ needs.build-and-push.outputs.tag_name }}"
      mock_mode: true
      cluster_name: "eks-dev-cluster"
      namespace: "gist-api-dev"
      aws_account_id: "111111111111"
      aws_region: "eu-west-1"
      docker_registry: "hemant1"
      image_name: "gist-api"
    secrets: inherit

  prep-qa:
    name: Prep QA
    needs: [build-and-push, deploy-dev]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Update QA Manifest
        run: |
          TAG="${{ needs.build-and-push.outputs.tag_name }}"
          MANIFEST=".github/deployments/qa-tags.yml"
          sed -i "s/tag:.*/tag: $TAG/" $MANIFEST
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add $MANIFEST
          git commit -m "chore(ops): update qa to $TAG [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push origin main

  deploy-qa:
    name: Deploy to QA
    needs: [build-and-push, prep-qa]
    uses: ./.github/workflows/deploy-template.yml
    with:
      environment: qa
      image_tag: "hemant1/gist-api:${{ needs.build-and-push.outputs.tag_name }}"
      mock_mode: true
      cluster_name: "eks-qa-cluster"
      namespace: "gist-api-qa"
      aws_account_id: "111111111111"
      aws_region: "eu-west-1"
      docker_registry: "hemant1"
      image_name: "gist-api"
    secrets: inherit

  prep-staging:
    name: Prep Staging
    needs: [build-and-push, deploy-qa]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Update Staging Manifest
        run: |
          TAG="${{ needs.build-and-push.outputs.tag_name }}"
          MANIFEST=".github/deployments/staging-tags.yml"
          sed -i "s/tag:.*/tag: $TAG/" $MANIFEST
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add $MANIFEST
          git commit -m "chore(ops): update staging to $TAG [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push origin main

  deploy-staging:
    name: Deploy to Staging
    needs: [build-and-push, prep-staging]
    uses: ./.github/workflows/deploy-template.yml
    with:
      environment: staging
      image_tag: "hemant1/gist-api:${{ needs.build-and-push.outputs.tag_name }}"
      mock_mode: true
      cluster_name: "eks-staging-cluster"
      namespace: "gist-api-staging"
      aws_account_id: "111111111111"
      aws_region: "eu-west-1"
      docker_registry: "hemant1"
      image_name: "gist-api"
    secrets: inherit

  prep-prod:
    name: Prep Prod
    needs: [build-and-push, deploy-staging]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Update Prod Manifest
        run: |
          TAG="${{ needs.build-and-push.outputs.tag_name }}"
          MANIFEST=".github/deployments/prod-tags.yml"
          sed -i "s/tag:.*/tag: $TAG/" $MANIFEST
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add $MANIFEST
          git commit -m "chore(ops): update prod to $TAG [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push origin main

  deploy-prod:
    name: Deploy to Production
    needs: [build-and-push, prep-prod]
    uses: ./.github/workflows/deploy-template.yml
    with:
      environment: prod
      image_tag: "hemant1/gist-api:${{ needs.build-and-push.outputs.tag_name }}"
      mock_mode: true
      cluster_name: "eks-prod-cluster"
      namespace: "gist-api-prod"
      aws_account_id: "111111111111"
      aws_region: "eu-west-1"
      docker_registry: "hemant1"
      image_name: "gist-api"
    secrets: inherit