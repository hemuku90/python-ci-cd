# =============================================================================
# Build Workflow: Docker Image Creation (Build Once)
# =============================================================================
# Builds the canonical Docker image when code is merged into develop.
# This image is then promoted/deployed across all environments.
# =============================================================================

name: Build Image

on:
  push:
    branches:
      - develop
      - 'release/*'
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: 'gist-api'
  DOCKER_REGISTRY: 'hemant1'
  ARTIFACT_RETENTION_DAYS: 30

permissions:
  id-token: write
  contents: read
  packages: write
  security-events: write

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.prep.outputs.image_tag }}
      short_sha: ${{ steps.prep.outputs.short_sha }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Metadata
        id: prep
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "image_tag=${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:sha-$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:development-${{ steps.prep.outputs.short_sha }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:qa-${{ steps.prep.outputs.short_sha }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ steps.prep.outputs.short_sha }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:uat-${{ steps.prep.outputs.short_sha }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:prod-${{ steps.prep.outputs.short_sha }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.prep.outputs.short_sha }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.prep.outputs.short_sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

  deploy-auto:
    name: Trigger Auto-Deployment
    needs: build-and-push
    # Auto-deploy on develop, release/*, or main
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/') || github.ref == 'refs/heads/main')
    uses: ./.github/workflows/cd.yml
    with:
      short_sha: ${{ needs.build-and-push.outputs.short_sha }}
