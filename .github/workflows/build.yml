# =============================================================================
# Build & Deploy Workflow: Image Build → Progressive Deployment
# =============================================================================
# Triggered on version tags (v*) or manually via workflow_dispatch.
# Builds a Docker image, scans for vulnerabilities, then deploys progressively
# through Dev → QA → Staging → Prod by updating Helm values manifests.
# =============================================================================

name: Build Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  IMAGE_NAME: 'gist-api'
  DOCKER_REGISTRY: 'hemant1'

# Workflow-level default: minimal permissions. Jobs override as needed.
permissions:
  contents: read
  security-events: write
  id-token: write

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      id-token: write
    outputs:
      tag_name: ${{ steps.prep.outputs.tag_name }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0  # Full history needed to resolve tag metadata

      - name: Prepare Metadata
        id: prep
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            TAG_NAME=$VERSION
          else
            TAG_NAME="manual-$(date +%s)"
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check Image Existence
        id: check
        run: |
          IMAGE_TAG="${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.prep.outputs.tag_name }}"
          if docker manifest inspect $IMAGE_TAG > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Image $IMAGE_TAG already exists. Skipping build."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Image $IMAGE_TAG not found. Building..."
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build and Push Image
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.prep.outputs.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Vulnerability Scan (Trivy)
        if: steps.check.outputs.exists == 'false'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.prep.outputs.tag_name }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy SARIF Results
        if: steps.check.outputs.exists == 'false' && always()
        uses: github/codeql-action/upload-sarif@ce28f5bb42b7a9f2c824e633a3f6ee835bab6858 # v3.28.9
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

  deploy-dev:
    name: Deploy Dev
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: dev
    permissions:
      contents: write  # Required to push manifest changes
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0  # Full history required for git push
      - name: Update Dev Manifest
        run: |
          TAG="${{ needs.build-and-push.outputs.tag_name }}"
          MANIFEST="deploy/helm/gist-api/values-dev.yaml"
          sed -i "s/tag:.*/tag: $TAG/" $MANIFEST
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add $MANIFEST
          git commit -m "chore(ops): update dev to $TAG [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push origin main

  deploy-qa:
    name: Deploy QA
    needs: [build-and-push, deploy-dev]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: qa
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0  # Full history required for git push
      - name: Update QA Manifest
        run: |
          TAG="${{ needs.build-and-push.outputs.tag_name }}"
          MANIFEST="deploy/helm/gist-api/values-qa.yaml"
          sed -i "s/tag:.*/tag: $TAG/" $MANIFEST
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add $MANIFEST
          git commit -m "chore(ops): update qa to $TAG [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push origin main

  deploy-staging:
    name: Deploy Staging
    needs: [build-and-push, deploy-qa]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: staging
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0  # Full history required for git push
      - name: Update Staging Manifest
        run: |
          TAG="${{ needs.build-and-push.outputs.tag_name }}"
          MANIFEST="deploy/helm/gist-api/values-staging.yaml"
          sed -i "s/tag:.*/tag: $TAG/" $MANIFEST
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add $MANIFEST
          git commit -m "chore(ops): update staging to $TAG [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push origin main

  deploy-prod:
    name: Deploy Prod
    needs: [build-and-push, deploy-staging]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production  # Must be configured in repo Settings → Environments with required reviewers
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0  # Full history required for git push
      - name: Update Prod Manifest
        run: |
          TAG="${{ needs.build-and-push.outputs.tag_name }}"
          MANIFEST="deploy/helm/gist-api/values-prod.yaml"
          sed -i "s/tag:.*/tag: $TAG/" $MANIFEST
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add $MANIFEST
          git commit -m "chore(ops): update prod to $TAG [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push origin main