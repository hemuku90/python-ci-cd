# =============================================================================
# Build & Deploy Workflow: Image Build → Progressive Deployment
# =============================================================================
# Triggered on version tags (v*) or manually via workflow_dispatch.
# Builds a Docker image, scans for vulnerabilities, generates SBOM, signs
# the image, then deploys progressively through Dev → QA → Staging → Prod
# with smoke tests, E2E, DAST, load tests, and notifications at each gate.
# =============================================================================

name: Build Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  IMAGE_NAME: 'gist-api'
  DOCKER_REGISTRY: 'hemant1'

# Workflow-level default: minimal permissions. Jobs override as needed.
permissions:
  contents: read
  id-token: write

jobs:
  # ===========================================================================
  # STAGE 1: Build, Scan, Sign
  # ===========================================================================
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    outputs:
      tag_name: ${{ steps.prep.outputs.tag_name }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.TOKEN_GITHUB }}
          fetch-depth: 0  # Full history needed to resolve tag metadata

      - name: Prepare Metadata
        id: prep
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            TAG_NAME=$VERSION
          else
            TAG_NAME="manual-$(date +%s)"
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check Image Existence
        id: check
        run: |
          IMAGE_TAG="${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.prep.outputs.tag_name }}"
          if docker manifest inspect $IMAGE_TAG > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Image $IMAGE_TAG already exists. Skipping build."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Image $IMAGE_TAG not found. Building..."
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build and Push Image
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.prep.outputs.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Vulnerability Scan (Trivy)
        if: steps.check.outputs.exists == 'false'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.prep.outputs.tag_name }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Generate SBOM (Mock)
        if: steps.check.outputs.exists == 'false'
        run: |
          echo "📦 Generating Software Bill of Materials (SBOM)..."
          echo "  → Scanning image layers for OS packages"
          echo "  → Scanning Python dependencies from site-packages"
          echo "  → Output format: SPDX JSON"
          echo "  → SBOM artifact: sbom-${{ steps.prep.outputs.tag_name }}.spdx.json"
          echo "✅ SBOM generated successfully (mock — replace with: syft <image> -o spdx-json)"

      - name: Sign Image with Cosign (Mock)
        if: steps.check.outputs.exists == 'false'
        run: |
          IMAGE="${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.prep.outputs.tag_name }}"
          echo "🔏 Signing container image..."
          echo "  → Image: $IMAGE"
          echo "  → Signing method: Keyless (Sigstore/Fulcio OIDC)"
          echo "  → Transparency log: Rekor"
          echo "✅ Image signed successfully (mock — replace with: cosign sign --yes $IMAGE)"

  # ===========================================================================
  # STAGE 2: Deploy Dev (auto-promote on build success)
  # ===========================================================================
  deploy-dev:
    name: Deploy Dev
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: dev
    permissions:
      contents: write  # Required to push manifest changes
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.TOKEN_GITHUB }}
          ref: main
          fetch-depth: 0  # Full history required for git push
      - name: Update Dev Manifest
        run: |
          TAG="${{ needs.build-and-push.outputs.tag_name }}"
          MANIFEST="deploy/helm/gist-api/values-dev.yaml"
          sed -i "s/tag:.*/tag: $TAG/" $MANIFEST
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add $MANIFEST
          git commit -m "chore(ops): update dev to $TAG [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push origin main
      - name: Smoke Test (Mock)
        run: |
          echo "🔥 Running Dev smoke tests..."
          echo "  → Waiting 30s for ArgoCD to sync..."
          echo "  → GET /health → 200 OK"
          echo "  → GET /docs → 200 OK"
          echo "  → Response time: 45ms (threshold: 500ms)"
          echo "✅ Dev smoke tests passed (mock)"
      - name: Notify — Dev Deployed (Mock)
        run: |
          TAG="${{ needs.build-and-push.outputs.tag_name }}"
          echo "📣 Sending Slack notification..."
          echo "  → Channel: #deployments"
          echo "  → Message: ✅ v$TAG deployed to DEV"
          echo "  → (mock — replace with: curl Slack webhook)"

  # ===========================================================================
  # STAGE 3: Deploy QA (auto-promote on Dev smoke passing)
  # ===========================================================================
  deploy-qa:
    name: Deploy QA
    needs: [build-and-push, deploy-dev]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: qa
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.TOKEN_GITHUB }}
          ref: main
          fetch-depth: 0  # Full history required for git push
      - name: Update QA Manifest
        run: |
          TAG="${{ needs.build-and-push.outputs.tag_name }}"
          MANIFEST="deploy/helm/gist-api/values-qa.yaml"
          sed -i "s/tag:.*/tag: $TAG/" $MANIFEST
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add $MANIFEST
          git commit -m "chore(ops): update qa to $TAG [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push origin main
      - name: Smoke Test (Mock)
        run: |
          echo "🔥 Running QA smoke tests..."
          echo "  → GET /health → 200 OK"
          echo "  → GET /docs → 200 OK"
          echo "✅ QA smoke tests passed (mock)"
      - name: E2E Tests (Mock)
        run: |
          echo "🧪 Running End-to-End API tests..."
          echo "  → POST /gists → 201 Created"
          echo "  → GET  /gists/{id} → 200 OK"
          echo "  → GET  /gists?user=octocat → 200 OK (3 results)"
          echo "  → Auth flow: token refresh → 200 OK"
          echo "  → Error handling: invalid user → 404 Not Found"
          echo "  → 12/12 scenarios passed"
          echo "✅ E2E tests passed (mock — replace with: pytest tests/e2e/)"
      - name: DAST Scan (Mock)
        run: |
          echo "🛡️  Running Dynamic Application Security Testing..."
          echo "  → Target: https://qa.gist-api.internal"
          echo "  → Scanner: OWASP ZAP Baseline"
          echo "  → Testing: SQL Injection, XSS, CSRF, SSRF, Broken Auth"
          echo "  → Findings: 0 HIGH, 0 MEDIUM, 2 LOW (informational)"
          echo "✅ DAST scan passed (mock — replace with: zap-baseline.py)"
      - name: Notify — QA Deployed (Mock)
        run: |
          TAG="${{ needs.build-and-push.outputs.tag_name }}"
          echo "📣 Sending Slack notification..."
          echo "  → Channel: #deployments"
          echo "  → Message: ✅ v$TAG deployed to QA — E2E ✓ DAST ✓"
          echo "  → (mock — replace with: curl Slack webhook)"

  # ===========================================================================
  # STAGE 4: Deploy Staging (auto-promote on QA E2E + DAST passing)
  # ===========================================================================
  deploy-staging:
    name: Deploy Staging
    needs: [build-and-push, deploy-qa]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: staging
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.TOKEN_GITHUB }}
          ref: main
          fetch-depth: 0  # Full history required for git push
      - name: Update Staging Manifest
        run: |
          TAG="${{ needs.build-and-push.outputs.tag_name }}"
          MANIFEST="deploy/helm/gist-api/values-staging.yaml"
          sed -i "s/tag:.*/tag: $TAG/" $MANIFEST
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add $MANIFEST
          git commit -m "chore(ops): update staging to $TAG [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push origin main
      - name: Smoke Test (Mock)
        run: |
          echo "🔥 Running Staging smoke tests..."
          echo "  → GET /health → 200 OK"
          echo "  → GET /docs → 200 OK"
          echo "✅ Staging smoke tests passed (mock)"
      - name: Load & Performance Test (Mock)
        run: |
          echo "📊 Running load/performance tests..."
          echo "  → Tool: k6 / Locust"
          echo "  → Scenario: 100 VUs, 5 min ramp-up"
          echo "  → Results:"
          echo "     • p50 latency: 32ms"
          echo "     • p95 latency: 89ms"
          echo "     • p99 latency: 145ms"
          echo "     • RPS: 850 req/s"
          echo "     • Error rate: 0.01%"
          echo "     • Threshold: p95 < 200ms ✓"
          echo "✅ Performance tests passed (mock — replace with: k6 run load-test.js)"
      - name: Canary Validation (Mock)
        run: |
          echo "🐤 Running canary validation..."
          echo "  → Canary weight: 10% traffic"
          echo "  → Error rate: 0.0% (threshold: 1%)"
          echo "  → Latency delta: +2ms (threshold: +50ms)"
          echo "  → Promoting to 100%"
          echo "✅ Canary validation passed (mock)"
      - name: Notify — Staging Deployed (Mock)
        run: |
          TAG="${{ needs.build-and-push.outputs.tag_name }}"
          echo "📣 Sending Slack notification..."
          echo "  → Channel: #deployments"
          echo "  → Message: ✅ v$TAG deployed to STAGING — Load ✓ Canary ✓"
          echo "  → (mock — replace with: curl Slack webhook)"

  # ===========================================================================
  # STAGE 5: Deploy Prod (MANUAL GATE — requires reviewer approval)
  # ===========================================================================
  deploy-prod:
    name: Deploy Prod
    needs: [build-and-push, deploy-staging]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production  # Must be configured in repo Settings → Environments with required reviewers
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.TOKEN_GITHUB }}
          ref: main
          fetch-depth: 0  # Full history required for git push
      - name: Update Prod Manifest
        run: |
          TAG="${{ needs.build-and-push.outputs.tag_name }}"
          MANIFEST="deploy/helm/gist-api/values-prod.yaml"
          sed -i "s/tag:.*/tag: $TAG/" $MANIFEST
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add $MANIFEST
          git commit -m "chore(ops): update prod to $TAG [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push origin main
      - name: Smoke Test (Mock)
        run: |
          echo "🔥 Running Prod smoke tests..."
          echo "  → GET /health → 200 OK"
          echo "  → GET /docs → 200 OK"
          echo "  → Response time: 38ms"
          echo "✅ Prod smoke tests passed (mock)"
      - name: Rollback Check (Mock)
        run: |
          echo "🔄 Validating rollback readiness..."
          echo "  → Previous version: stored in ArgoCD history"
          echo "  → Rollback command: argocd app rollback gist-api-prod"
          echo "  → Health check: Monitoring error rate for 5 min..."
          echo "  → Error rate: 0.0% — no rollback needed"
          echo "✅ Rollback check passed (mock)"
      - name: Notify — Prod Deployed (Mock)
        run: |
          TAG="${{ needs.build-and-push.outputs.tag_name }}"
          echo "📣 Sending Slack + PagerDuty notification..."
          echo "  → Slack #deployments: 🚀 v$TAG deployed to PRODUCTION"
          echo "  → Slack #engineering: 🚀 v$TAG is live"
          echo "  → PagerDuty: Change event created for v$TAG"
          echo "  → (mock — replace with: curl Slack/PD webhooks)"