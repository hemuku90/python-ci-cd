# =============================================================================
# CD Workflow: Continuous Deployment (Deploy Everywhere)
# =============================================================================
# Deploys the canonical image to various environments based on branch.
# Environments: dev, qa, staging, uat, prod
# =============================================================================

name: CD

on:
  # 1. Manual trigger (for QA promotion)
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, qa, staging, uat, prod]
      short_sha:
        description: 'Short SHA to deploy (optional)'
        required: false
        type: string

  # 2. Reusable trigger (called by Build Image for auto-deploy)
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      short_sha:
        type: string
        required: true

  # 3. Release promotion triggers
  push:
    branches: ['release/*', main]

jobs:
  resolve-env:
    name: Resolve Target Environment
    runs-on: ubuntu-latest
    outputs:
      env_list: ${{ steps.set-env.outputs.env_list }}
      short_sha: ${{ steps.set-tag.outputs.short_sha }}
    steps:
      - name: Set Environment List
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "env_list=[\"${{ github.event.inputs.environment }}\"]" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_call" ]]; then
            echo "env_list=[\"${{ inputs.environment }}\"]" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" =~ refs/heads/release/.* ]]; then
            echo "env_list=[\"staging\", \"uat\"]" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env_list=[\"prod\"]" >> $GITHUB_OUTPUT
          else
            echo "env_list=[]" >> $GITHUB_OUTPUT
          fi

      - name: Resolve Short SHA
        id: set-tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_call" ]]; then
            SHORT_SHA="${{ inputs.short_sha }}"
          elif [[ "${{ github.event.inputs.short_sha }}" != "" ]]; then
            SHORT_SHA="${{ github.event.inputs.short_sha }}"
          else
            SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          fi
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to ${{ matrix.environment }}
    needs: resolve-env
    strategy:
      matrix:
        environment: ${{ fromJson(needs.resolve-env.outputs.env_list) }}
      max-parallel: 1
    uses: ./.github/workflows/deploy-template.yml
    with:
      environment: ${{ matrix.environment }}
      # Use descriptive tags based on environment
      image_tag: "hemant1/gist-api:${{ matrix.environment == 'dev' && 'development' || matrix.environment }}-${{ needs.resolve-env.outputs.short_sha }}"
      mock_mode: true
      cluster_name: "eks-${{ matrix.environment }}-cluster"
      namespace: "gist-api-${{ matrix.environment }}"
      aws_account_id: "111111111111" # Mock Account ID
      aws_region: "eu-west-1"
      docker_registry: "hemant1"
      image_name: "gist-api"
    secrets:
      aws_role: "arn:aws:iam::111111111111:role/github-actions-eks-deploy"
