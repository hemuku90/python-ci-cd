# =============================================================================
# CD Pipeline - Deploy to EKS Environments via Helm
# =============================================================================
name: CD - Deploy

on:
  push:
    branches: [develop, main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - uat
          - staging
          - production
      image-tag:
        description: 'Docker image tag to deploy (e.g. sha-xyz123)'
        required: true
        type: string

env:
  AWS_REGION: 'eu-west-1'
  ECR_REPOSITORY: 'gist-api'
  HELM_RELEASE_NAME: 'gist-api'
  # Account IDs for isolated environment deployments
  AWS_ACCOUNT_SHARED: '111111111111'
  AWS_ACCOUNT_DEV:    '222222222222'
  AWS_ACCOUNT_UAT:    '333333333333'
  AWS_ACCOUNT_STG:    '444444444444'
  AWS_ACCOUNT_PROD:   '999999999999'

jobs:
  # ===========================================================================
  # 1. Resolve & Validate Image
  # ===========================================================================
  validate:
    name: Validate Image in ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ steps.resolve-tag.outputs.tag }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Resolve image tag
        id: resolve-tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.image-tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS Credentials (Shared Services)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_SHARED }}:role/github-actions-ecr-push-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify image exists in ECR
        run: |
          docker manifest inspect ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.resolve-tag.outputs.tag }} > /dev/null || {
            echo "::error::Image tag ${{ steps.resolve-tag.outputs.tag }} not found in ECR. Ensure CI pipeline has run."
            exit 1
          }

  # ===========================================================================
  # 2. Deploy to Dev
  # ===========================================================================
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'dev'
    environment: dev
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials (Dev Account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_DEV }}:role/github-actions-eks-deploy-role
          aws-region: ${{ env.AWS_REGION }}
      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name dev-eks-cluster --region ${{ env.AWS_REGION }}
      - name: Helm Upgrade
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} ./helm/gist-api \
            --namespace dev \
            --create-namespace \
            --set image.repository=${{ needs.validate.outputs.ecr-registry }}/${{ env.ECR_REPOSITORY }} \
            --set image.tag=${{ needs.validate.outputs.image-tag }} \
            --wait

  # ===========================================================================
  # 3. Deploy to UAT (Requires Manual Approval in GitHub Environments)
  # ===========================================================================
  deploy-uat:
    name: Deploy to UAT
    runs-on: ubuntu-latest
    needs: validate
    # Triggers on release tags, or manual dispatch
    if: github.event_name == 'release' || github.event.inputs.environment == 'uat'
    environment: uat # Ensure this environment in GitHub Settings has "Required reviewers"
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials (UAT Account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_UAT }}:role/github-actions-eks-deploy-role
          aws-region: ${{ env.AWS_REGION }}
      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name uat-eks-cluster --region ${{ env.AWS_REGION }}
      - name: Helm Upgrade
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} ./helm/gist-api \
            --namespace uat \
            --create-namespace \
            --set image.repository=${{ needs.validate.outputs.ecr-registry }}/${{ env.ECR_REPOSITORY }} \
            --set image.tag=${{ needs.validate.outputs.image-tag }} \
            --wait

  # ===========================================================================
  # 4. Deploy to Staging (Requires Manual Approval)
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [validate, deploy-uat] # Sequential after UAT for releases
    if: github.event_name == 'release' || github.event.inputs.environment == 'staging'
    environment: staging
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials (Staging Account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_STG }}:role/github-actions-eks-deploy-role
          aws-region: ${{ env.AWS_REGION }}
      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name stg-eks-cluster --region ${{ env.AWS_REGION }}
      - name: Helm Upgrade
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} ./helm/gist-api \
            --namespace staging \
            --create-namespace \
            --set image.repository=${{ needs.validate.outputs.ecr-registry }}/${{ env.ECR_REPOSITORY }} \
            --set image.tag=${{ needs.validate.outputs.image-tag }} \
            --wait

  # ===========================================================================
  # 5. Deploy to Production (Requires Manual Approval)
  # ===========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: validate
    # Triggers on push to main or explicit manual deploy
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.environment == 'production'
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials (Prod Account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_PROD }}:role/github-actions-eks-deploy-role
          aws-region: ${{ env.AWS_REGION }}
      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name prod-eks-cluster --region ${{ env.AWS_REGION }}
      - name: Helm Upgrade
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} ./helm/gist-api \
            --namespace production \
            --create-namespace \
            --set image.repository=${{ needs.validate.outputs.ecr-registry }}/${{ env.ECR_REPOSITORY }} \
            --set image.tag=${{ needs.validate.outputs.image-tag }} \
            --wait