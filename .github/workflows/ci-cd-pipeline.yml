# =============================================================================
# Consolidated CI/CD Pipeline
# =============================================================================
# Features:
# - Docker build and push to DockerHub
# - Security scanning with Trivy
# - Environment promotion (dev -> qa -> staging -> uat -> production)
# - Image tag management per environment
# - GitOps repository updates
# - Manual approval gates for non-dev environments
# =============================================================================

name: CI/CD Pipeline

on:
  # Trigger on push to develop branch
  push:
    branches:
      - develop
      - release/*
      - main
  # Manual trigger for promotions
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - build
          - promote
      source_environment:
        description: 'Source environment (for promotion)'
        required: false
        type: choice
        options:
          - dev
          - qa
          - staging
          - uat
          - production
      target_environment:
        description: 'Target environment'
        required: false
        type: choice
        options:
          - dev
          - qa
          - staging
          - uat
          - production
      image_tag:
        description: 'Image tag to promote (optional)'
        required: false

env:
  AWS_REGION: 'eu-west-1'
  IMAGE_NAME: 'gist-api'
  DOCKER_REGISTRY: 'hemant1'
  GITOPS_REPO: 'hemant1/gitops-manifests'

# Cancel in-progress runs for same workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.target_environment || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # =============================================================================
  # Job 1: Determine Action and Environment
  # =============================================================================
  determine-action:
    name: Determine Action
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.determine.outputs.action }}
      source_environment: ${{ steps.determine.outputs.source_environment }}
      target_environment: ${{ steps.determine.outputs.target_environment }}
      image_tag: ${{ steps.determine.outputs.image_tag }}
      should_build: ${{ steps.determine.outputs.should_build }}
      should_promote: ${{ steps.determine.outputs.should_promote }}
    steps:
      - name: Determine action
        id: determine
        run: |
          # Default action is build for push events
          ACTION="${{ github.event.inputs.action }}"
          SOURCE="${{ github.event.inputs.source_environment }}"
          TARGET="${{ github.event.inputs.target_environment }}"
          IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          SHOULD_BUILD="false"
          SHOULD_PROMOTE="false"

          if [ "$ACTION" == "build" ] || [ "$ACTION" == "" ]; then
            # Build action - determine target environment from branch
            SHOULD_BUILD="true"
            SHOULD_PROMOTE="true"
            
            REF="${{ github.ref }}"
            case "$REF" in
              refs/heads/develop)
                TARGET="dev"
                ;;
              refs/heads/release/*)
                TARGET="qa"
                ;;
              refs/heads/main)
                TARGET="production"
                ;;
              *)
                echo "Unknown branch: $REF"
                exit 1
                ;;
            esac
            SOURCE="build"
            IMAGE_TAG="${{ github.sha }}"
          elif [ "$ACTION" == "promote" ]; then
            # Promotion action
            SHOULD_BUILD="false"
            SHOULD_PROMOTE="true"
            
            if [ -z "$SOURCE" ] || [ -z "$TARGET" ]; then
              echo "Source and target environments are required for promotion"
              exit 1
            fi
            
            # If no image_tag provided, construct from source environment
            if [ -z "$IMAGE_TAG" ]; then
              IMAGE_TAG="${{ github.sha }}"
            fi
          fi

          echo "action=$ACTION" >> $GITHUB_OUTPUT
          echo "source_environment=$SOURCE" >> $GITHUB_OUTPUT
          echo "target_environment=$TARGET" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "should_build=$SHOULD_BUILD" >> $GITHUB_OUTPUT
          echo "should_promote=$SHOULD_PROMOTE" >> $GITHUB_OUTPUT

          echo "=== Action Summary ==="
          echo "Action: $ACTION"
          echo "Source: $SOURCE"
          echo "Target: $TARGET"
          echo "Image Tag: $IMAGE_TAG"
          echo "Should Build: $SHOULD_BUILD"
          echo "Should Promote: $SHOULD_PROMOTE"

  # =============================================================================
  # Job 2: Build and Push Docker Image
  # =============================================================================
  build:
    name: Build and Push Image
    needs: determine-action
    if: needs.determine-action.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}
      short_sha: ${{ steps.build.outputs.short_sha }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: build
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          FULL_IMAGE_TAG="${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:$SHORT_SHA"
          
          docker build -t $FULL_IMAGE_TAG .
          docker push $FULL_IMAGE_TAG
          
          # Also push as latest on main/develop
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            docker tag $FULL_IMAGE_TAG "${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            docker push "${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          fi
          
          echo "image_tag=$FULL_IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          
          echo "✓ Built and pushed image: $FULL_IMAGE_TAG"

  # =============================================================================
  # Job 3: Security Scan with Trivy
  # =============================================================================
  security-scan:
    name: Security Scan
    needs: [determine-action, build]
    if: needs.determine-action.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      scan_passed: ${{ steps.scan.outputs.scan_passed }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy scanner
        id: scan
        run: |
          # Install Trivy
          curl -sfL https://aquasecurity.github.io/trivy/v0.49.0/install.sh | sh
          
          # Get the image to scan
          IMAGE="${{ needs.build.outputs.image_tag }}"
          
          # Pull the image
          docker pull $IMAGE
          
          # Run Trivy scan
          trivy image --exit-code 0 --severity HIGH,CRITICAL $IMAGE > trivy-report.txt || true
          
          # Check for vulnerabilities
          VULN_COUNT=$(trivy image --severity HIGH,CRITICAL $IMAGE 2>/dev/null | grep -c "Total:" || echo "0")
          
          if [ "$VULN_COUNT" -gt "0" ]; then
            echo "scan_passed=false" >> $GITHUB_OUTPUT
            echo "✗ Security scan failed: $VULN_COUNT vulnerabilities found"
            exit 1
          else
            echo "scan_passed=true" >> $GITHUB_OUTPUT
            echo "✓ Security scan passed: No critical vulnerabilities found"
          fi

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt

  # =============================================================================
  # Job 4: Create Environment-Specific Tags
  # =============================================================================
  tag-for-environment:
    name: Tag for Environment
    needs: [determine-action, build]
    runs-on: ubuntu-latest
    outputs:
      env_image_tag: ${{ steps.tag.outputs.env_image_tag }}
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create environment tag
        id: tag
        run: |
          TARGET="${{ needs.determine-action.outputs.target_environment }}"
          SHORT_SHA="${{ needs.build.outputs.short_sha }}"
          
          # Create environment-specific tag (e.g., dev-abc123, qa-abc123)
          ENV_TAG="${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:$TARGET-$SHORT_SHA"
          SOURCE_IMAGE="${{ needs.build.outputs.image_tag }}"
          
          # Tag the image
          docker tag $SOURCE_IMAGE $ENV_TAG
          docker push $ENV_TAG
          
          echo "env_image_tag=$ENV_TAG" >> $GITHUB_OUTPUT
          echo "✓ Created and pushed environment tag: $ENV_TAG"

  # =============================================================================
  # Job 5: Promote Image Between Environments
  # =============================================================================
  promote:
    name: Promote Image
    needs: [determine-action]
    if: needs.determine-action.outputs.should_promote == 'true'
    runs-on: ubuntu-latest
    outputs:
      promoted_image_tag: ${{ steps.promote.outputs.promoted_image_tag }}
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine source image
        id: determine_source
        run: |
          SOURCE="${{ needs.determine-action.outputs.source_environment }}"
          TARGET="${{ needs.determine-action.outputs.target_environment }}"
          IMAGE_TAG="${{ needs.determine-action.outputs.image_tag }}"
          
          # Construct source image tag
          if [ "$SOURCE" == "build" ]; then
            SHORT_SHA=$(echo "$IMAGE_TAG" | cut -c1-8)
            SOURCE_IMAGE="${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:$SHORT_SHA"
          else
            SHORT_SHA=$(echo "$IMAGE_TAG" | cut -c1-8)
            SOURCE_IMAGE="${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:$SOURCE-$SHORT_SHA"
          fi
          
          echo "source_image=$SOURCE_IMAGE" >> $GITHUB_OUTPUT
          echo "source=$SOURCE" >> $GITHUB_OUTPUT
          echo "target=$TARGET" >> $GITHUB_OUTPUT

      - name: Verify source image exists
        run: |
          docker manifest inspect ${{ steps.determine_source.outputs.source_image }}
          echo "✓ Source image verified: ${{ steps.determine_source.outputs.source_image }}"

      - name: Create promotion tag
        id: promote
        run: |
          SOURCE="${{ steps.determine_source.outputs.source }}"
          TARGET="${{ steps.determine_source.outputs.target }}"
          SOURCE_IMAGE="${{ steps.determine_source.outputs.source_image }}"
          SHORT_SHA=$(echo "$SOURCE_IMAGE" | rev | cut -d':' -f1 | rev | cut -c1-8)
          
          # Create target environment tag
          TARGET_IMAGE="${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:$TARGET-$SHORT_SHA"
          
          # Tag and push
          docker tag $SOURCE_IMAGE $TARGET_IMAGE
          docker push $TARGET_IMAGE
          
          # Also update the environment's "latest" tag
          docker tag $SOURCE_IMAGE "${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:$TARGET-latest"
          docker push "${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:$TARGET-latest"
          
          echo "promoted_image_tag=$TARGET_IMAGE" >> $GITHUB_OUTPUT
          echo "✓ Promoted image to: $TARGET_IMAGE"

  # =============================================================================
  # Job 6: Update GitOps Repository
  # =============================================================================
  update-gitops:
    name: Update GitOps Repository
    needs: [determine-action, tag-for-environment, promote]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GITOPS_REPO }}
          ref: main
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

      - name: Update environment manifest
        run: |
          TARGET="${{ needs.determine-action.outputs.target_environment }}"
          IMAGE_TAG="${{ needs.promote.outputs.promoted_image_tag }}"
          
          if [ -z "$IMAGE_TAG" ]; then
            IMAGE_TAG="${{ needs.tag-for-environment.outputs.env_image_tag }}"
          fi
          
          # Create environment directory and file
          mkdir -p environments/$TARGET
          echo "image: $IMAGE_TAG" > environments/$TARGET/image.yaml
          echo "updated_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> environments/$TARGET/image.yaml
          
          # Commit and push
          git add environments/$TARGET/image.yaml
          git commit -m "Update $TARGET to $IMAGE_TAG"
          git push
          
          echo "✓ Updated GitOps repository: $TARGET -> $IMAGE_TAG"

      - name: Create Pull Request
        if: needs.determine-action.outputs.target_environment == 'production'
        run: |
          BRANCH_NAME="promotion/$(date +%Y%m%d-%H%M%S)"
          
          git checkout -b $BRANCH_NAME
          git push -u origin $BRANCH_NAME
          
          gh pr create \
            --title "Promotion to Production" \
            --body "Automated promotion from staging to production" \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =============================================================================
  # Job 7: Send Notifications
  # =============================================================================
  notify:
    name: Notify
    needs: [determine-action, build, security-scan, tag-for-environment, promote, update-gitops]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Determine Action | ${{ needs.determine-action.result }} |" >> $GITHUB_STEP_SUMMARY
          
          if needs.determine-action.outputs.should_build == 'true'; then
            echo "| Build Image | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Tag for Environment | ${{ needs.tag-for-environment.result }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if needs.determine-action.outputs.should_promote == 'true'; then
            echo "| Promote Image | ${{ needs.promote.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Update GitOps | ${{ needs.update-gitops.result }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Environment Details" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Action:** ${{ needs.determine-action.outputs.action }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Source:** ${{ needs.determine-action.outputs.source_environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target:** ${{ needs.determine-action.outputs.target_environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag:** ${{ needs.promote.outputs.promoted_image_tag || needs.tag-for-environment.outputs.env_image_tag }}" >> $GITHUB_STEP_SUMMARY

      - name: Send Slack Notification
        if: failure()
        run: |
          echo "Sending failure notification to Slack..."
          # Add Slack webhook integration here
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"CI/CD Pipeline Failed: ${{ github.repository }}"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
