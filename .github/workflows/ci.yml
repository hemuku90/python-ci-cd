# =============================================================================
# CI Workflow: Continuous Integration & Validation
# =============================================================================
# Runs on every PR to ensure code quality and security.
# Executes: Linting, SAST, Secret Detection, Dependency Scanning, Unit Tests.
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  # Allows manual validation
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'

# Workflow-level default: read-only. Jobs override only what they need.
permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.TOKEN_GITHUB }}
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install Linting Tools
        run: |
          pip install ruff flake8
      - name: Run Ruff Check
        run: ruff check src/ tests/
      - name: Run Ruff Format
        run: ruff format --check src/ tests/
      - name: Run Flake8
        run: flake8 src/ tests/ --max-line-length=120

  security-sast:
    name: SAST Scan (Bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.TOKEN_GITHUB }}
          fetch-depth: 1
      - name: Run Bandit
        run: |
          pip install bandit
          # Fail on MEDIUM/HIGH; output to console (SARIF upload requires GHAS on private repos)
          bandit -r src/ -f screen -ll --exclude tests/,venv/

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.TOKEN_GITHUB }}
          fetch-depth: 0  # Full history required for Gitleaks to scan all commits
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_GITHUB }}

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.TOKEN_GITHUB }}
          fetch-depth: 1
      - name: Dependency Check
        run: |
          pip install safety
          if [ -f pyproject.toml ]; then
            pip install .
          fi
          safety check --full-report
        continue-on-error: true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.TOKEN_GITHUB }}
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install Dependencies
        run: |
          pip install -e ".[dev]"
      - name: Run Tests
        run: |
          # Adjusted coverage for Trunk Based Development
          pytest tests/ --cov=src --cov-report=xml --cov-fail-under=80 --junitxml=junit.xml
      - name: Upload Coverage Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
      - name: Upload Test Results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: test-results
          path: junit.xml
          retention-days: 7
