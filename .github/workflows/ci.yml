# =============================================================================
# CI Workflow: Continuous Integration & Validation
# =============================================================================
# Runs on every PR to ensure code quality and security.
# Executes: Linting, SAST, Secret Detection, Dependency Scanning, Unit Tests.
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  # Allows manual validation
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install Linting Tools
        run: |
          pip install ruff flake8
      - name: Run Ruff Check
        run: ruff check src/ tests/
      - name: Run Ruff Format
        run: ruff format --check src/ tests/
      - name: Run Flake8
        run: flake8 src/ tests/ --max-line-length=120

  security-sast:
    name: SAST Scan (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Run Bandit
        run: |
          pip install bandit bandit-sarif-formatter
          # Fail on MEDIUM/HIGH for Trunk
          bandit -r src/ -f sarif -o bandit-results.sarif -ll --exclude tests/,venv/ || true
      - name: Upload SAST Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'bandit-results.sarif'
          category: 'bandit'

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Dependency Check
        run: |
          pip install safety
          if [ -f pyproject.toml ]; then
            pip install .
          fi
          safety check --full-report
        continue-on-error: true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install Dependencies
        run: |
          pip install -e ".[dev]"
      - name: Run Tests
        run: |
          # Adjusted coverage for Trunk Based Development
          pytest tests/ --cov=src --cov-report=xml --cov-fail-under=80
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
