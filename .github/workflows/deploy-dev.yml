# =============================================================================
# Deploy to Development Environment
# =============================================================================
# Auto-deploys when code is pushed to develop branch
# Uses reusable deploy template
# =============================================================================

name: Deploy to Dev

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (optional - defaults to dev-<short-sha>)'
        required: false
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.extract_sha.outputs.short_sha }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Extract Short SHA
        id: extract_sha
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT

  deploy-dev:
    permissions:
      id-token: write
      contents: read
    needs: prepare
    uses: ./.github/workflows/deploy-template.yml
    with:
      environment: dev
      image_tag: ${{ github.event.inputs.image_tag || format('dev-{0}', needs.prepare.outputs.short_sha) }}
      cluster_name: eks-dev-cluster
      namespace: gist-api-dev
      deployment_strategy: RollingUpdate
      aws_account_id: "111111111111"
      aws_region: eu-west-1
      ecr_registry: 111111111111.dkr.ecr.eu-west-1.amazonaws.com
      image_name: gist-api
    secrets:
      aws_role: arn:aws:iam::111111111111:role/github-actions-eks-deploy
