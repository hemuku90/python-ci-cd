# =============================================================================
# Deploy to Production Environment
# =============================================================================
# Auto-deploys when code is pushed to main branch
# Uses reusable deploy template
# =============================================================================

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy'
        required: true
        type: string

jobs:
  deploy-production:
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-template.yml
    with:
      environment: prod
      image_tag: ${{ github.event.inputs.image_tag || github.sha }}
      cluster_name: eks-prod-cluster
      namespace: gist-api-prod
      deployment_strategy: Canary
      aws_account_id: "444444444444"
      aws_region: eu-west-1
      ecr_registry: 111111111111.dkr.ecr.eu-west-1.amazonaws.com
      image_name: gist-api
    secrets:
      aws_role: arn:aws:iam::444444444444:role/github-actions-eks-deploy
