# =============================================================================
# Deployment Workflow: Production
# =============================================================================
# Triggers on push to main.
# Performs: Pull UAT -> Tag Prod -> Push Prod -> Deploy Prod
# =============================================================================

name: Deploy Prod

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  resolve-source-image:
    name: Resolve & Promote Prod
    runs-on: ubuntu-latest
    outputs:
      source_sha: ${{ steps.resolve.outputs.source_sha }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Source SHA
        id: resolve
        run: |
          # Prod comes from UAT, which comes from Staging (release branches)
          # We search for the ancestor on develop/release that has the image
          git fetch origin develop --depth=100 || true
          SOURCE_SHA=$(git merge-base origin/develop HEAD | cut -c1-8)
          if [ -z "$SOURCE_SHA" ]; then
             SOURCE_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          fi
          echo "source_sha=$SOURCE_SHA" >> $GITHUB_OUTPUT
          echo "Source SHA resolved to: $SOURCE_SHA"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote Image (UAT -> Prod)
        run: |
          IMAGE_NAME="hemant1/gist-api"
          SHA="${{ steps.resolve.outputs.source_sha }}"
          echo "Promoting image for SHA: $SHA"
          
          # Pull from UAT (previous env)
          docker pull $IMAGE_NAME:uat-$SHA
          
          # Tag for Prod
          docker tag $IMAGE_NAME:uat-$SHA $IMAGE_NAME:prod-$SHA
          
          # Push to registry
          docker push $IMAGE_NAME:prod-$SHA

  deploy-prod:
    name: Deploy to Production
    needs: resolve-source-image
    uses: ./.github/workflows/deploy-template.yml
    with:
      environment: prod
      image_tag: "hemant1/gist-api:prod-${{ needs.resolve-source-image.outputs.source_sha }}"
      mock_mode: true
      cluster_name: "eks-prod-cluster"
      namespace: "gist-api-prod"
      aws_account_id: "111111111111"
      aws_region: "eu-west-1"
      docker_registry: "hemant1"
      image_name: "gist-api"
    secrets:
      aws_role: "arn:aws:iam::111111111111:role/github-actions-eks-deploy"
