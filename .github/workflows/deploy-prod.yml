# =============================================================================
# Deployment Workflow: Production
# =============================================================================
# Triggers on push to main.
# Performs: Pull UAT -> Tag Prod -> Push Prod -> Deploy Prod
# =============================================================================

name: Deploy Prod

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  resolve-tag:
    name: Resolve SHA
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.set-tag.outputs.short_sha }}
    steps:
      - name: Set Tag
        id: set-tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

  promote-and-deploy:
    name: Promote & Deploy Prod
    needs: resolve-tag
    runs-on: ubuntu-latest
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull, Tag, Push (Linear Promotion)
        run: |
          IMAGE_NAME="hemant1/gist-api"
          SHA="${{ needs.resolve-tag.outputs.short_sha }}"
          # Explicitly pulling from UAT
          docker pull $IMAGE_NAME:uat-$SHA
          docker tag $IMAGE_NAME:uat-$SHA $IMAGE_NAME:prod-$SHA
          docker push $IMAGE_NAME:prod-$SHA

  deploy-prod:
    name: Deploy to Production
    needs: [resolve-tag, promote-and-deploy]
    uses: ./.github/workflows/deploy-template.yml
    with:
      environment: prod
      image_tag: "hemant1/gist-api:prod-${{ needs.resolve-tag.outputs.short_sha }}"
      mock_mode: true
      cluster_name: "eks-prod-cluster"
      namespace: "gist-api-prod"
      aws_account_id: "111111111111"
      aws_region: "eu-west-1"
      docker_registry: "hemant1"
      image_name: "gist-api"
    secrets:
      aws_role: "arn:aws:iam::111111111111:role/github-actions-eks-deploy"
