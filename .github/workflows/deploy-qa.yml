# =============================================================================
# Deploy to QA Environment
# =============================================================================
# Manual trigger only
# Uses reusable deploy template
# =============================================================================

name: Deploy to QA

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (optional - defaults to short SHA)'
        required: false
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.extract_sha.outputs.short_sha }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Extract Short SHA
        id: extract_sha
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT

  deploy-qa:
    permissions:
      id-token: write
      contents: read
    needs: prepare
    uses: ./.github/workflows/deploy-template.yml
    with:
      environment: qa
      image_tag: ${{ github.event.inputs.image_tag || needs.prepare.outputs.short_sha }}
      cluster_name: eks-qa-cluster
      namespace: gist-api-qa
      deployment_strategy: RollingUpdate
      aws_account_id: "111111111111"
      aws_region: eu-west-1
      docker_registry: hemant1
      image_name: gist-api
    secrets:
      aws_role: arn:aws:iam::111111111111:role/github-actions-eks-deploy
