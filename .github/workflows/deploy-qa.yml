# =============================================================================
# Deploy to QA Environment
# =============================================================================
# Manual trigger only
# Uses reusable deploy template
# =============================================================================

name: Deploy to QA

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy'
        required: true
        type: string

jobs:
  deploy-qa:
    uses: ./.github/workflows/deploy-template.yml
    with:
      environment: qa
      image_tag: ${{ github.event.inputs.image_tag }}
      cluster_name: eks-qa-cluster
      namespace: gist-api-qa
      deployment_strategy: RollingUpdate
      aws_account_id: "222222222222"
      aws_region: eu-west-1
      ecr_registry: 111111111111.dkr.ecr.eu-west-1.amazonaws.com
      image_name: gist-api
    secrets:
      aws_role: arn:aws:iam::222222222222:role/github-actions-eks-deploy
