# =============================================================================
# Deployment Workflow: QA
# =============================================================================
# Triggers automatically after Dev deployment success.
# Performs: Pull Dev -> Tag QA -> Push QA -> Deploy QA
# =============================================================================

name: Deploy QA

on:
  workflow_call:
    inputs:
      short_sha:
        type: string
        required: true

jobs:
  promote-and-deploy:
    name: Promote & Deploy QA
    runs-on: ubuntu-latest
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull, Tag, Push (Linear Promotion)
        run: |
          IMAGE_NAME="hemant1/gist-api"
          SHA="${{ inputs.short_sha }}"
          docker pull $IMAGE_NAME:development-$SHA
          docker tag $IMAGE_NAME:development-$SHA $IMAGE_NAME:qa-$SHA
          docker push $IMAGE_NAME:qa-$SHA

  deploy-qa:
    name: Deploy to QA
    needs: promote-and-deploy
    uses: ./.github/workflows/deploy-template.yml
    with:
      environment: qa
      image_tag: "hemant1/gist-api:qa-${{ inputs.short_sha }}"
      mock_mode: true
      cluster_name: "eks-qa-cluster"
      namespace: "gist-api-qa"
      aws_account_id: "111111111111"
      aws_region: "eu-west-1"
      docker_registry: "hemant1"
      image_name: "gist-api"
    secrets:
      aws_role: "arn:aws:iam::111111111111:role/github-actions-eks-deploy"
