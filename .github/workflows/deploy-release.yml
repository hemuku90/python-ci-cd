name: deploy-release

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Release branch to deploy (example: release/1.2.3 or release/v1.2.3)"
        required: true

permissions:
  contents: write
  id-token: write

env:
  IMAGE_REPO: hemant1/gist-api

jobs:
  deploy-qa:
    runs-on: ubuntu-latest
    environment: qa
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_digest: ${{ steps.meta.outputs.image_digest }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_ref }}
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION="$(python -c "import pathlib,re; text=pathlib.Path('pyproject.toml').read_text(); m=re.search(r'(?m)^version = \\\"([^\\\"]+)\\\"', text); print(m.group(1) if m else '')")"
          if [ -z "$VERSION" ]; then
            echo "Version not found in pyproject.toml"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate release version
        run: |
          RELEASE_VERSION="${{ inputs.release_ref }}"
          RELEASE_VERSION="${RELEASE_VERSION#release/}"
          RELEASE_VERSION="${RELEASE_VERSION#v}"
          PYPROJECT_VERSION="${{ steps.version.outputs.version }}"
          PYPROJECT_VERSION="${PYPROJECT_VERSION#v}"
          if [ "$RELEASE_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "Release branch version (${RELEASE_VERSION}) must match pyproject.toml version (${PYPROJECT_VERSION})."
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_REPO }}:sha-${{ github.sha }}
            ${{ env.IMAGE_REPO }}:v${{ steps.version.outputs.version }}
            ${{ env.IMAGE_REPO }}:build-${{ github.run_number }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        continue-on-error: true
        with:
          image-ref: ${{ env.IMAGE_REPO }}@${{ steps.build.outputs.digest }}
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          format: "table"
          exit-code: "1"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_REPO }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          artifact-name: sbom.spdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: cosign sign --yes ${{ env.IMAGE_REPO }}@${{ steps.build.outputs.digest }}

      - name: Capture image metadata
        id: meta
        run: |
          echo "image_digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"
          echo "image_tag=v${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"
          echo "version=${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Install yq
        run: |
          sudo curl -sSL -o /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Update QA values on main
        run: |
          git fetch origin main
          git checkout main
          yq -i ".image.tag = \"${{ steps.meta.outputs.image_tag }}\" | .image.digest = \"${{ steps.meta.outputs.image_digest }}\"" deploy/helm/gist-api/values-qa.yaml

      - name: Commit QA promotion
        id: promote_qa
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/gist-api/values-qa.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(qa): promote release ${{ steps.meta.outputs.image_tag }}"
          git push origin HEAD:main

      - name: Open PR if direct push is blocked
        if: steps.promote_qa.outcome == 'failure'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: "bot/qa-promotion-${{ github.run_id }}"
          title: "chore(qa): promote release ${{ steps.meta.outputs.image_tag }}"
          commit-message: "chore(qa): promote release ${{ steps.meta.outputs.image_tag }}"
          body: "Automated promotion of the release image tag and digest to QA."
          base: main

  deploy-stage:
    runs-on: ubuntu-latest
    needs: deploy-qa
    environment: stage
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install yq
        run: |
          sudo curl -sSL -o /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Update stage values
        run: |
          yq -i ".image.tag = \"${{ needs.deploy-qa.outputs.image_tag }}\" | .image.digest = \"${{ needs.deploy-qa.outputs.image_digest }}\"" deploy/helm/gist-api/values-stage.yaml

      - name: Commit stage promotion
        id: promote_stage
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/gist-api/values-stage.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(stage): promote release ${{ needs.deploy-qa.outputs.image_tag }}"
          git push origin HEAD:main

      - name: Open PR if direct push is blocked
        if: steps.promote_stage.outcome == 'failure'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: "bot/stage-promotion-${{ github.run_id }}"
          title: "chore(stage): promote release ${{ needs.deploy-qa.outputs.image_tag }}"
          commit-message: "chore(stage): promote release ${{ needs.deploy-qa.outputs.image_tag }}"
          body: "Automated promotion of the release image tag and digest to Stage."
          base: main

  deploy-uat:
    runs-on: ubuntu-latest
    needs: [deploy-stage, deploy-qa]
    environment: uat
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install yq
        run: |
          sudo curl -sSL -o /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Update uat values
        run: |
          yq -i ".image.tag = \"${{ needs.deploy-qa.outputs.image_tag }}\" | .image.digest = \"${{ needs.deploy-qa.outputs.image_digest }}\"" deploy/helm/gist-api/values-uat.yaml

      - name: Commit uat promotion
        id: promote_uat
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/gist-api/values-uat.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(uat): promote release ${{ needs.deploy-qa.outputs.image_tag }}"
          git push origin HEAD:main

      - name: Open PR if direct push is blocked
        if: steps.promote_uat.outcome == 'failure'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: "bot/uat-promotion-${{ github.run_id }}"
          title: "chore(uat): promote release ${{ needs.deploy-qa.outputs.image_tag }}"
          commit-message: "chore(uat): promote release ${{ needs.deploy-qa.outputs.image_tag }}"
          body: "Automated promotion of the release image tag and digest to UAT."
          base: main
