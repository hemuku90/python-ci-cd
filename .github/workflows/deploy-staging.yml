# =============================================================================
# Deployment Workflow: Staging
# =============================================================================
# Triggers on push to release/*.
# Performs: Pull QA -> Tag Staging -> Push Staging -> Deploy Staging
# =============================================================================

name: Deploy Staging

on:
  push:
    branches: ['release/*']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  resolve-source-image:
    name: Resolve & Promote Staging
    runs-on: ubuntu-latest
    outputs:
      source_sha: ${{ steps.resolve.outputs.source_sha }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for merge-base

      - name: Resolve Source SHA
        id: resolve
        run: |
          # The source image comes from a commit that was successfully built on 'develop'
          # We find the common ancestor between this branch and develop
          # If develop is not available locally, we try to find the previous commit
          git fetch origin develop || true
          SOURCE_SHA=$(git merge-base origin/develop HEAD | cut -c1-8)
          if [ -z "$SOURCE_SHA" ]; then
            # Fallback to current SHA if merge-base fails
            SOURCE_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          fi
          echo "source_sha=$SOURCE_SHA" >> $GITHUB_OUTPUT
          echo "Source SHA resolved to: $SOURCE_SHA"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote Image (QA -> Staging)
        run: |
          IMAGE_NAME="hemant1/gist-api"
          SHA="${{ steps.resolve.outputs.source_sha }}"
          echo "Promoting image for SHA: $SHA"
          
          # Pull from QA (previous env)
          docker pull $IMAGE_NAME:qa-$SHA
          
          # Tag for Staging
          docker tag $IMAGE_NAME:qa-$SHA $IMAGE_NAME:staging-$SHA
          
          # Push to registry
          docker push $IMAGE_NAME:staging-$SHA

  deploy-staging:
    name: Deploy to Staging
    needs: resolve-source-image
    uses: ./.github/workflows/deploy-template.yml
    with:
      environment: staging
      image_tag: "hemant1/gist-api:staging-${{ needs.resolve-source-image.outputs.source_sha }}"
      mock_mode: true
      cluster_name: "eks-staging-cluster"
      namespace: "gist-api-staging"
      aws_account_id: "111111111111"
      aws_region: "eu-west-1"
      docker_registry: "hemant1"
      image_name: "gist-api"
    secrets:
      aws_role: "arn:aws:iam::111111111111:role/github-actions-eks-deploy"

  trigger-uat:
    name: Promote to UAT
    needs: [resolve-source-image, deploy-staging]
    uses: ./.github/workflows/deploy-uat.yml
    with:
      short_sha: ${{ needs.resolve-source-image.outputs.source_sha }}
    secrets: inherit
