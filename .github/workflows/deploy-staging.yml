# =============================================================================
# Deploy to Staging Environment
# =============================================================================
# Auto-deploys when code is pushed to release/* branches
# Uses reusable deploy template
# =============================================================================

name: Deploy to Staging

on:
  push:
    branches: ['release/*']
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy'
        required: true
        type: string

jobs:
  deploy-staging:
    uses: ./.github/workflows/deploy-template.yml
    with:
      environment: staging
      image_tag: ${{ github.event.inputs.image_tag || github.sha }}
      cluster_name: eks-staging-cluster
      namespace: gist-api-staging
      deployment_strategy: BlueGreen
      aws_account_id: "333333333333"
      aws_region: eu-west-1
      ecr_registry: 111111111111.dkr.ecr.eu-west-1.amazonaws.com
      image_name: gist-api
    secrets:
      aws_role: arn:aws:iam::333333333333:role/github-actions-eks-deploy
