# =============================================================================
# Deploy to Staging Environment
# =============================================================================
# Auto-deploys when code is pushed to release/* branches
# Uses reusable deploy template
# =============================================================================

name: Deploy to Staging

on:
  push:
    branches: ['release/*']
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (optional - defaults to short SHA)'
        required: false
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.extract_sha.outputs.short_sha }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Extract Short SHA
        id: extract_sha
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT

  deploy-staging:
    permissions:
      id-token: write
      contents: read
    needs: prepare
    uses: ./.github/workflows/deploy-template.yml
    with:
      environment: staging
      image_tag: ${{ github.event.inputs.image_tag || needs.prepare.outputs.short_sha }}
      cluster_name: eks-staging-cluster
      namespace: gist-api-staging
      deployment_strategy: BlueGreen
      aws_account_id: "333333333333"
      aws_region: eu-west-1
      ecr_registry: 111111111111.dkr.ecr.eu-west-1.amazonaws.com
      image_name: gist-api
    secrets:
      aws_role: arn:aws:iam::333333333333:role/github-actions-eks-deploy
