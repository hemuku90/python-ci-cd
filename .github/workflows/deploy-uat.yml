# =============================================================================
# Deployment Workflow: UAT
# =============================================================================
# Triggers automatically after Staging deployment success.
# Performs: Pull Staging -> Tag UAT -> Push UAT -> Deploy UAT
# =============================================================================

name: Deploy UAT

on:
  workflow_call:
    inputs:
      short_sha:
        type: string
        required: true

jobs:
  promote-and-deploy:
    name: Promote & Deploy UAT
    runs-on: ubuntu-latest
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull, Tag, Push (Linear Promotion)
        run: |
          IMAGE_NAME="hemant1/gist-api"
          SHA="${{ inputs.short_sha }}"
          # Explicitly pulling from Staging
          docker pull $IMAGE_NAME:staging-$SHA
          docker tag $IMAGE_NAME:staging-$SHA $IMAGE_NAME:uat-$SHA
          docker push $IMAGE_NAME:uat-$SHA

  deploy-uat:
    name: Deploy to UAT
    needs: promote-and-deploy
    uses: ./.github/workflows/deploy-template.yml
    with:
      environment: uat
      image_tag: "hemant1/gist-api:uat-${{ inputs.short_sha }}"
      mock_mode: true
      cluster_name: "eks-uat-cluster"
      namespace: "gist-api-uat"
      aws_account_id: "111111111111"
      aws_region: "eu-west-1"
      docker_registry: "hemant1"
      image_name: "gist-api"
    secrets:
      aws_role: "arn:aws:iam::111111111111:role/github-actions-eks-deploy"
