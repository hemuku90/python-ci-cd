# =============================================================================
# Deploy to UAT Environment
# =============================================================================
# Manual trigger only
# Uses reusable deploy template
# =============================================================================

name: Deploy to UAT

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy'
        required: true
        type: string

jobs:
  deploy-uat:
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-template.yml
    with:
      environment: uat
      image_tag: ${{ github.event.inputs.image_tag }}
      cluster_name: eks-uat-cluster
      namespace: gist-api-uat
      deployment_strategy: RollingUpdate
      aws_account_id: "555555555555"
      aws_region: eu-west-1
      ecr_registry: 111111111111.dkr.ecr.eu-west-1.amazonaws.com
      image_name: gist-api
    secrets:
      aws_role: arn:aws:iam::555555555555:role/github-actions-eks-deploy
