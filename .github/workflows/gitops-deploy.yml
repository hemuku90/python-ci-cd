# =============================================================================
# GitOps Workflow: Orchestrated Deployment from Manifests
# =============================================================================
# Triggers whenever a manifest in .github/deployments/ is updated.
# Executes the actual deployment to the target environment.
# =============================================================================

name: GitOps Deploy

on:
  push:
    branches: [main]
    paths:
      - '.github/deployments/*.yml'

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    name: Detect & Deploy
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.process.outputs.env }}
      tag: ${{ steps.process.outputs.tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Process Manifest Changes
        id: process
        run: |
          FILES=$(git diff --name-only HEAD^ HEAD | grep ".github/deployments/.*-tags.yml" || true)
          
          if [ -z "$FILES" ]; then
            echo "No deployment manifests modified."
            exit 0
          fi
          
          for FILE in $FILES; do
            ENV=$(basename $FILE | sed 's/-tags.yml//')
            TAG=$(grep 'tag:' $FILE | sed 's/tag:[[:space:]]*//')
            
            echo "env=$ENV" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          done

  deploy:
    name: Deploy to Environment
    needs: detect-changes
    if: needs.detect-changes.outputs.env != ''
    uses: ./.github/workflows/deploy-template.yml
    with:
      environment: ${{ needs.detect-changes.outputs.env }}
      image_tag: "hemant1/gist-api:${{ needs.detect-changes.outputs.tag }}"
      mock_mode: true
      cluster_name: "eks-${{ needs.detect-changes.outputs.env }}-cluster"
      namespace: "gist-api-${{ needs.detect-changes.outputs.env }}"
      aws_account_id: "111111111111"
      aws_region: "eu-west-1"
      docker_registry: "hemant1"
      image_name: "gist-api"
    secrets: inherit
