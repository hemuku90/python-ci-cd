# =============================================================================
# GitOps Workflow: Orchestrated Deployment from Manifests
# =============================================================================
# Triggers whenever a manifest in .github/deployments/ is updated.
# Executes the actual deployment to the target environment.
# =============================================================================

name: GitOps Deploy

on:
  push:
    branches: [main]
    paths:
      - '.github/deployments/*.yml'

permissions:
  id-token: write
  contents: write

jobs:
  detect-changes:
    name: Detect & Deploy
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.process.outputs.env }}
      tag: ${{ steps.process.outputs.tag }}
      next_env: ${{ steps.process.outputs.next_env }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Process Manifest Changes
        id: process
        run: |
          FILES=$(git diff --name-only HEAD^ HEAD | grep ".github/deployments/.*-tags.yml" || true)
          
          if [ -z "$FILES" ]; then
            echo "No deployment manifests modified."
            exit 0
          fi
          
          # Logic handles one promotion per commit for simplicity
          for FILE in $FILES; do
            ENV=$(basename $FILE | sed 's/-tags.yml//')
            TAG=$(grep 'tag:' $FILE | sed 's/tag:[[:space:]]*//')
            
            CASE_ENV=$(echo $ENV | tr '[:upper:]' '[:lower:]')
            case $CASE_ENV in
              dev) NEXT="qa" ;;
              qa) NEXT="staging" ;;
              staging) NEXT="prod" ;;
              *) NEXT="" ;;
            esac

            echo "env=$ENV" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "next_env=$NEXT" >> $GITHUB_OUTPUT
          done

  deploy:
    name: Deploy to Environment
    needs: detect-changes
    if: needs.detect-changes.outputs.env != ''
    uses: ./.github/workflows/deploy-template.yml
    with:
      environment: ${{ needs.detect-changes.outputs.env }}
      image_tag: "hemant1/gist-api:${{ needs.detect-changes.outputs.tag }}"
      mock_mode: true
      cluster_name: "eks-${{ needs.detect-changes.outputs.env }}-cluster"
      namespace: "gist-api-${{ needs.detect-changes.outputs.env }}"
      aws_account_id: "111111111111"
      aws_region: "eu-west-1"
      docker_registry: "hemant1"
      image_name: "gist-api"
    secrets: inherit

  cascade:
    name: Cascade Promotion
    needs: [detect-changes, deploy]
    if: needs.detect-changes.outputs.next_env != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update Next Manifest
        run: |
          NEXT_ENV="${{ needs.detect-changes.outputs.next_env }}"
          TAG="${{ needs.detect-changes.outputs.tag }}"
          MANIFEST=".github/deployments/${NEXT_ENV}-tags.yml"
          
          echo "Cascading to $NEXT_ENV: Updating $MANIFEST to tag $TAG"
          sed -i "s/tag:.*/tag: $TAG/" $MANIFEST
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add $MANIFEST
          git commit -m "chore(ops): cascade promotion to $NEXT_ENV for $TAG [skip ci]"
          git push origin main
