# =============================================================================
# PR Validation Workflow
# =============================================================================
# Runs on every PR to develop branch
# Executes: Unit tests, static analysis, dependency scanning, secret detection
# Fails fast on security check failures
# =============================================================================

name: PR Validation

on:
  pull_request:
    branches: [develop, main, 'release/*']
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel in-progress runs for same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint & Format Check
  # ---------------------------------------------------------------------------
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff flake8

      - name: Run Ruff Linter
        run: ruff check src/ tests/

      - name: Run Ruff Formatter Check
        run: ruff format --check src/ tests/

      - name: Run Flake8
        run: flake8 src/ tests/ --max-line-length=120

  # ---------------------------------------------------------------------------
  # Job 2: Static Application Security Testing (SAST)
  # ---------------------------------------------------------------------------
  security-sast:
    name: SAST Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Bandit security scan
        uses: PyCQA/bandit-action@v1
        with:
          path: "."
          level: high
          confidence: high
          exit_zero: true
      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'results.sarif'
          category: 'bandit'

  # ---------------------------------------------------------------------------
  # Job 3: Secret Detection
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: 'true'
          GITLEAKS_CONFIG_PATH: .gitleaks.toml

  # ---------------------------------------------------------------------------
  # Job 4: Dependency Vulnerability Scanning
  # ---------------------------------------------------------------------------
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate Dependency SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: 'spdx-json'
          output-file: 'dependency-sbom.json'

      - name: Run Safety (Python Dependency Checker)
        run: |
          pip install safety
          safety check --json --output dependencies.json || true
        continue-on-error: true

      - name: Upload Safety Results
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: dependency-scan-results
          path: dependencies.json
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 5: Unit Tests
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: |
          pytest tests/ --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=80 -v

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 6: Build Acceptance (Docker Build Test)
  # ---------------------------------------------------------------------------
  build-acceptance:
    name: Build Acceptance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (No Push)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: pr-build:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            pr.build=true

  # ---------------------------------------------------------------------------
  # Job 7: Container Vulnerability Scan (Trivy)
  # ---------------------------------------------------------------------------
  container-scan:
    name: Container Scan
    runs-on: ubuntu-latest
    needs: build-acceptance
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (No Push)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: pr-build:${{ github.sha }}
          cache-from: type=gha

      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'pr-build:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'
