name: promote-release

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Release branch to promote (example: release/1.2.3 or release/v1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0

      - name: Install yq
        run: |
          sudo curl -sSL -o /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Validate release version
        run: |
          SOURCE_REF="${{ inputs.source_ref }}"
          RELEASE_VERSION="${SOURCE_REF#release/}"
          RELEASE_VERSION="${RELEASE_VERSION#v}"
          PYPROJECT_VERSION="$(python -c "import pathlib,re; text=pathlib.Path('pyproject.toml').read_text(); m=re.search(r'(?m)^version = \\\"([^\\\"]+)\\\"', text); print(m.group(1) if m else '')")"
          if [ -z "$PYPROJECT_VERSION" ]; then
            echo "Version not found in pyproject.toml"
            exit 1
          fi
          PYPROJECT_VERSION="${PYPROJECT_VERSION#v}"
          if [ "$RELEASE_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "Release branch version (${RELEASE_VERSION}) must match pyproject.toml version (${PYPROJECT_VERSION})."
            exit 1
          fi

      - name: Sync release branch
        run: git pull --rebase origin "${{ inputs.source_ref }}"

      - name: Promote QA to Stage and UAT
        run: |
          IMAGE_TAG="$(yq -r '.image.tag' deploy/helm/gist-api/values-qa.yaml)"
          IMAGE_DIGEST="$(yq -r '.image.digest' deploy/helm/gist-api/values-qa.yaml)"
          if [ -z "$IMAGE_TAG" ] || [ "$IMAGE_TAG" = "null" ]; then
            echo "image.tag missing in values-qa.yaml"
            exit 1
          fi
          if [ -z "$IMAGE_DIGEST" ] || [ "$IMAGE_DIGEST" = "null" ]; then
            echo "image.digest missing in values-qa.yaml"
            exit 1
          fi
          yq -i ".image.tag = \"${IMAGE_TAG}\" | .image.digest = \"${IMAGE_DIGEST}\"" deploy/helm/gist-api/values-stage.yaml
          yq -i ".image.tag = \"${IMAGE_TAG}\" | .image.digest = \"${IMAGE_DIGEST}\"" deploy/helm/gist-api/values-uat.yaml

      - name: Commit release promotion
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/gist-api/values-stage.yaml deploy/helm/gist-api/values-uat.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(release): promote qa to stage/uat"
          git push origin HEAD:"${{ inputs.source_ref }}"
