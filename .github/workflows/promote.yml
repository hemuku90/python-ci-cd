name: promote

on:
  workflow_dispatch:
    inputs:
      source_env:
        description: "Source environment (dev/qa/stage/uat/prod)"
        required: true
        default: "dev"
      target_env:
        description: "Target environment (qa/stage/uat/prod)"
        required: true
        default: "qa"
      source_ref:
        description: "Release branch for stage/uat/prod (example: release/1.2.0)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_env }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install yq
        run: |
          sudo curl -sSL -o /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version
  
      - name: Fetch development
        run: git fetch origin development

      - name: Read source image
        id: source
        run: |
          SOURCE_ENV="${{ inputs.source_env }}"
          TARGET_ENV="${{ inputs.target_env }}"
          SOURCE_REF="${{ inputs.source_ref }}"
          if [ "$SOURCE_ENV" = "$TARGET_ENV" ]; then
            echo "source and target env must differ"
            exit 1
          fi
          case "$TARGET_ENV" in
            stage|uat|prod)
              if [ "$SOURCE_ENV" != "qa" ]; then
                echo "For stage/uat/prod, source_env must be qa."
                exit 1
              fi
              if [ -z "$SOURCE_REF" ]; then
                echo "source_ref is required for stage/uat/prod (release/*)."
                exit 1
              fi
              if ! echo "$SOURCE_REF" | grep -Eq '^release/'; then
                echo "source_ref must be a release/* branch."
                exit 1
              fi
              git fetch origin "$SOURCE_REF"
              git show "origin/$SOURCE_REF:deploy/helm/gist-api/values-qa.yaml" > /tmp/values-source.yaml
              git show "origin/$SOURCE_REF:pyproject.toml" > /tmp/pyproject.toml
              RELEASE_VERSION="${SOURCE_REF#release/}"
              PYPROJECT_VERSION="$(python - <<'PY'
              import pathlib, re
              text = pathlib.Path("/tmp/pyproject.toml").read_text()
              match = re.search(r'(?m)^version = \"([^\"]+)\"', text)
              if not match:
                  raise SystemExit("Version not found in pyproject.toml")
              print(match.group(1))
              PY
              )"
              if [ "$RELEASE_VERSION" != "$PYPROJECT_VERSION" ]; then
                echo "Release branch version (${RELEASE_VERSION}) must match pyproject.toml version (${PYPROJECT_VERSION})."
                exit 1
              fi
              ;;
            qa)
              if [ "$SOURCE_ENV" != "dev" ]; then
                echo "For qa, source_env must be dev."
                exit 1
              fi
              git show origin/development:deploy/helm/gist-api/values-dev.yaml > /tmp/values-source.yaml
              ;;
            *)
              if [ "$SOURCE_ENV" = "dev" ]; then
                git show origin/development:deploy/helm/gist-api/values-dev.yaml > /tmp/values-source.yaml
              else
                cp "deploy/helm/gist-api/values-${SOURCE_ENV}.yaml" /tmp/values-source.yaml
              fi
              ;;
          esac
          IMAGE_TAG="$(yq -r '.image.tag' /tmp/values-source.yaml)"
          IMAGE_DIGEST="$(yq -r '.image.digest' /tmp/values-source.yaml)"
          if [ "$TARGET_ENV" = "stage" ] || [ "$TARGET_ENV" = "uat" ] || [ "$TARGET_ENV" = "prod" ]; then
            if [ "v${PYPROJECT_VERSION}" != "$IMAGE_TAG" ]; then
              echo "image.tag must match v${PYPROJECT_VERSION} for release promotions."
              exit 1
            fi
          fi
          if [ -z "$IMAGE_TAG" ] || [ "$IMAGE_TAG" = "null" ]; then
            echo "image.tag missing in source values"
            exit 1
          fi
          if [ -z "$IMAGE_DIGEST" ] || [ "$IMAGE_DIGEST" = "null" ]; then
            echo "image.digest missing in source values"
            exit 1
          fi
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "IMAGE_DIGEST=$IMAGE_DIGEST" >> "$GITHUB_ENV"

      - name: Update target values
        run: |
          TARGET_ENV="${{ inputs.target_env }}"
          if [ ! -f "deploy/helm/gist-api/values-${TARGET_ENV}.yaml" ]; then
            echo "Target values file not found."
            exit 1
          fi
          yq -i '.image.tag = strenv(IMAGE_TAG) | .image.digest = strenv(IMAGE_DIGEST)' "deploy/helm/gist-api/values-${TARGET_ENV}.yaml"

      - name: Commit promotion
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "deploy/helm/gist-api/values-${{ inputs.target_env }}.yaml"
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(${{ inputs.target_env }}): promote image ${IMAGE_TAG}"
          git push origin HEAD:main
