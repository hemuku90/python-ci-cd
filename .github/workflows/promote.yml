# =============================================================================
# Artifact Promotion Workflow
# =============================================================================
# Promotes immutable Docker image between environments
# Only Dev is auto-promoted. QA, Stage, Production require manual approval.
# Same image is tagged and promoted, not rebuilt
# =============================================================================

name: Promote Artifact

on:
  # Triggered after build completes successfully - ONLY for develop branch
  workflow_run:
    workflows: ["Build & Sign Image (Mock)"]
    types: [completed]
    branches: [develop]  # Only auto-promote to Dev
  # Allow manual promotion for all environments
  workflow_dispatch:
    inputs:
      source_environment:
        description: 'Source environment'
        required: true
        type: choice
        options:
          - dev
          - qa
          - staging
          - uat
      target_environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - qa
          - staging
          - uat
          - production
      image_tag:
        description: 'Image tag to promote (Git SHA)'
        required: true

env:
  AWS_REGION: 'eu-west-1'
  IMAGE_NAME: 'gist-api'
  DOCKER_REGISTRY: 'hemant1'

# Cancel in-progress runs for same target
concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.target_environment || 'auto' }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Validate Source Image
  # ---------------------------------------------------------------------------
  validate-image:
    name: Validate Image for Promotion
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.validate.outputs.image-tag }}
      promotion-allowed: ${{ steps.validate.outputs.promotion-allowed }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Determine Promotion Path
        id: validate
        run: |
          # Determine source and target from workflow context
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            REF="${{ github.event.workflow_run.head_branch }}"
            
            case "$REF" in
              develop)
                # Auto-promote only to Dev
                SOURCE="build"
                TARGET="dev"
                ;;
              release/*)
                # Release branches - require manual promotion
                echo "Release branch detected. Manual promotion required."
                echo "Please use workflow_dispatch to promote to QA/Stage/UAT/Prod"
                echo "promotion-allowed=false" >> $GITHUB_OUTPUT
                exit 0
                ;;
              main)
                # Main branch - require manual promotion
                echo "Main branch detected. Manual promotion required."
                echo "Please use workflow_dispatch to promote to Production"
                echo "promotion-allowed=false" >> $GITHUB_OUTPUT
                exit 0
                ;;
              *)
                echo "Unknown branch: $REF"
                exit 1
                ;;
            esac
          else
            SOURCE="${{ github.event.inputs.source_environment }}"
            TARGET="${{ github.event.inputs.target_environment }}"
          fi
          
          echo "source=$SOURCE" >> $GITHUB_OUTPUT
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          
          # Get image SHA from previous build
          if [ "$SOURCE" == "build" ]; then
            # From develop branch - use the latest built image
            IMAGE_TAG="${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}"
          elif [ "$SOURCE" == "dev" ]; then
            IMAGE_TAG="${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}"
          elif [ "$SOURCE" == "qa" ]; then
            IMAGE_TAG="${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}"
          elif [ "$SOURCE" == "staging" ]; then
            IMAGE_TAG="${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}"
          elif [ "$SOURCE" == "uat" ]; then
            IMAGE_TAG="${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}"
          else
            # Manual trigger
            IMAGE_TAG="${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}"
          fi
          
          echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "promotion-allowed=true" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials (Mock - Shared Services)
        run: |
          echo "=========================================================="
          echo "MOCK: AWS Credentials Configuration Step"
          echo "Role ARN: arn:aws:iam::${{ secrets.SHARED_SERVICES_ACCOUNT_ID }}:role/github-actions-ecr-push"
          echo "AWS Region: ${{ env.AWS_REGION }}"
          echo "=========================================================="
          echo "Note: This is a mock step. In production, this would"
          echo "assume the IAM role using aws-actions/configure-aws-credentials@v4"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify Image Exists
        run: |
          IMAGE="${{ steps.validate.outputs.image-tag }}"
          docker manifest inspect $IMAGE
          echo "✓ Image verified: $IMAGE"

  # ---------------------------------------------------------------------------
  # Job 2: Verify Image Signature
  # ---------------------------------------------------------------------------
  verify-signature:
    name: Verify Image Signature
    needs: validate-image
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials (Mock - for Signature Verification)
        run: |
          echo "=========================================================="
          echo "MOCK: AWS Credentials Configuration Step"
          echo "Role ARN: arn:aws:iam::${{ secrets.SHARED_SERVICES_ACCOUNT_ID }}:role/github-actions-ecr-push"
          echo "AWS Region: ${{ env.AWS_REGION }}"
          echo "=========================================================="
          echo "Note: This is a mock step. In production, this would"
          echo "assume the IAM role using aws-actions/configure-aws-credentials@v4"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.4.0

      - name: Verify Image Signature
        run: |
          cosign verify --key aws-kms://${{ secrets.KMS_KEY_ARN }} \
            ${{ needs.validate-image.outputs.image-tag }}
          echo "✓ Image signature verified"

  # ---------------------------------------------------------------------------
  # Job 3: Create Promotion Tag
  # ---------------------------------------------------------------------------
  create-promotion-tag:
    name: Create Promotion Tag
    needs: [validate-image, verify-signature]
    runs-on: ubuntu-latest
    outputs:
      dev-tag: ${{ steps.tag.outputs.dev-tag }}
      qa-tag: ${{ steps.tag.outputs.qa-tag }}
      staging-tag: ${{ steps.tag.outputs.staging-tag }}
      uat-tag: ${{ steps.tag.outputs.uat-tag }}
      prod-tag: ${{ steps.tag.outputs.prod-tag }}
    steps:
      - name: Configure AWS Credentials (Mock - for Tag Creation)
        run: |
          echo "=========================================================="
          echo "MOCK: AWS Credentials Configuration Step"
          echo "Role ARN: arn:aws:iam::${{ secrets.SHARED_SERVICES_ACCOUNT_ID }}:role/github-actions-ecr-push"
          echo "AWS Region: ${{ env.AWS_REGION }}"
          echo "=========================================================="
          echo "Note: This is a mock step. In production, this would"
          echo "assume the IAM role using aws-actions/configure-aws-credentials@v4"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create Environment Tags
        id: tag
        run: |
          SOURCE_IMAGE="${{ needs.validate-image.outputs.image-tag }}"
          FULL_SHA=$(echo $SOURCE_IMAGE | rev | cut -d':' -f1 | rev)
          SHORT_SHA=$(echo $FULL_SHA | cut -c1-8)
          
          # Create tags for each environment: <env>-<short-sha>
          docker tag $SOURCE_IMAGE ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:dev-$SHORT_SHA
          docker tag $SOURCE_IMAGE ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:qa-$SHORT_SHA
          docker tag $SOURCE_IMAGE ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:staging-$SHORT_SHA
          docker tag $SOURCE_IMAGE ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:uat-$SHORT_SHA
          docker tag $SOURCE_IMAGE ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:prod-$SHORT_SHA
          
          # Push tags to ECR
          docker push ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:dev-$SHORT_SHA
          docker push ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:qa-$SHORT_SHA
          docker push ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:staging-$SHORT_SHA
          docker push ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:uat-$SHORT_SHA
          docker push ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:prod-$SHORT_SHA
          
          echo "dev-tag=${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:dev-$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "qa-tag=${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:qa-$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "staging-tag=${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:staging-$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "uat-tag=${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:uat-$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "prod-tag=${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:prod-$SHORT_SHA" >> $GITHUB_OUTPUT
          
          echo "✓ Promotion tags created and pushed to ECR"

  # ---------------------------------------------------------------------------
  # Job 4: Update GitOps Repository
  # ---------------------------------------------------------------------------
  update-gitops:
    name: Update GitOps Repository
    needs: create-promotion-tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GITOPS_REPO }}
          ref: main
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

      - name: Update Dev Manifest
        if: needs.create-promotion-tag.outputs.dev-tag != ''
        run: |
          # Update image tag in kustomization or helm values
          echo "image: ${{ needs.create-promotion-tag.outputs.dev-tag }}" > environments/dev/image.yaml
          git add environments/dev/image.yaml
          git commit -m "Promote to Dev: ${{ needs.create-promotion-tag.outputs.dev-tag }}"
          git push

      - name: Update QA Manifest
        if: needs.create-promotion-tag.outputs.qa-tag != ''
        run: |
          echo "image: ${{ needs.create-promotion-tag.outputs.qa-tag }}" > environments/qa/image.yaml
          git add environments/qa/image.yaml
          git commit -m "Promote to QA: ${{ needs.create-promotion-tag.outputs.qa-tag }}"
          git push

      - name: Update Staging Manifest
        if: needs.create-promotion-tag.outputs.staging-tag != ''
        run: |
          echo "image: ${{ needs.create-promotion-tag.outputs.staging-tag }}" > environments/staging/image.yaml
          git add environments/staging/image.yaml
          git commit -m "Promote to Staging: ${{ needs.create-promotion-tag.outputs.staging-tag }}"
          git push

      - name: Update UAT Manifest
        if: needs.create-promotion-tag.outputs.uat-tag != ''
        run: |
          echo "image: ${{ needs.create-promotion-tag.outputs.uat-tag }}" > environments/uat/image.yaml
          git add environments/uat/image.yaml
          git commit -m "Promote to UAT: ${{ needs.create-promotion-tag.outputs.uat-tag }}"
          git push

      - name: Update Production Manifest
        if: needs.create-promotion-tag.outputs.prod-tag != ''
        run: |
          echo "image: ${{ needs.create-promotion-tag.outputs.prod-tag }}" > environments/production/image.yaml
          git add environments/production/image.yaml
          git commit -m "Promote to Production: ${{ needs.create-promotion-tag.outputs.prod-tag }}"
          git push

      - name: Create Promotion PR
        if: needs.create-promotion-tag.outputs.prod-tag != ''
        run: |
          git checkout -b promotion/$(date +%Y%m%d-%H%M%S)
          git push -u origin promotion/$(date +%Y%m%d-%H%M%S)
          
          gh pr create \
            --title "Promotion to Production" \
            --body "Automated promotion from Staging to Production" \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job 5: Notify Promotion Complete
  # ---------------------------------------------------------------------------
  notify:
    name: Notify Promotion
    needs: [validate-image, verify-signature, create-promotion-tag, update-gitops]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Promotion Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validate Image | ${{ needs.validate-image.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Verify Signature | ${{ needs.verify-signature.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Create Tags | ${{ needs.create-promotion-tag.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Update GitOps | ${{ needs.update-gitops.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Docker Image Artifact Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source Image:** ${{ needs.validate-image.outputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Promotion Tags Created:**" >> $GITHUB_STEP_SUMMARY
          echo "- Dev: ${{ needs.create-promotion-tag.outputs.dev-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- QA: ${{ needs.create-promotion-tag.outputs.qa-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- Staging: ${{ needs.create-promotion-tag.outputs.staging-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- UAT: ${{ needs.create-promotion-tag.outputs.uat-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- Production: ${{ needs.create-promotion-tag.outputs.prod-tag }}" >> $GITHUB_STEP_SUMMARY
