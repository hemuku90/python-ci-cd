# =============================================================================
# Promotion Workflow: Manual GitOps Manifest Update
# =============================================================================
# Manually triggered to promote a specific tag to ANY environment.
# Updates the respective YAML manifest to trigger a deployment.
# =============================================================================

name: Promote Image

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Environment to promote to'
        required: true
        type: choice
        options:
          - dev
          - qa
          - staging
          - prod
      tag:
        description: 'Image tag to promote (e.g., 1.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-manifest:
    name: Update Manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main # Ensure we are on main

      - name: Update Manifest File
        run: |
          ENV="${{ github.event.inputs.target_env }}"
          TAG="${{ github.event.inputs.tag }}"
          MANIFEST=".github/deployments/${ENV}-tags.yml"
          
          if [ ! -f "$MANIFEST" ]; then
            echo "Error: Manifest $MANIFEST not found."
            exit 1
          fi
          
          echo "Updating $MANIFEST to use tag: $TAG"
          sed -i "s/tag:.*/tag: $TAG/" $MANIFEST
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add $MANIFEST
          git commit -m "chore(ops): promote ${ENV} to ${TAG} [skip ci]" || echo "No changes to commit"
          git push origin main
