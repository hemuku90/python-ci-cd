name: release-tag

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          python - <<'PY' > /tmp/version.txt
          import pathlib, re
          text = pathlib.Path("pyproject.toml").read_text()
          match = re.search(r'(?m)^version = "([^"]+)"', text)
          if not match:
            raise SystemExit("Version not found in pyproject.toml")
          print(match.group(1))
          PY
          echo "VERSION=$(cat /tmp/version.txt)" >> "$GITHUB_ENV"

      - name: Create tag if missing
        run: |
          TAG="v${VERSION}"
          if git tag -l "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists."
            exit 0
          fi
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
