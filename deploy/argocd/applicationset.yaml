apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: gist-api-environments
  namespace: argocd
spec:
  generators:
  - list:
      elements:
        - env: dev
          namespace: gist-api-dev
          revision: development
        - env: qa
          namespace: gist-api-qa
          revision: main
        - env: stage
          namespace: gist-api-stage
          revision: main
        - env: uat
          namespace: gist-api-uat
          revision: main
        - env: prod
          namespace: gist-api-prod
          revision: main
  template:
    metadata:
      name: 'gist-api-{{env}}'
    spec:
      project: default
      source:
        repoURL: 'git@github.com:hemuku90/python-ci-cd.git'
        targetRevision: '{{revision}}'
        path: deploy/helm/gist-api
        helm:
          valueFiles:
            - 'values.yaml'
            - 'values-{{env}}.yaml'
      destination:
        server: 'https://kubernetes.default.svc'
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
